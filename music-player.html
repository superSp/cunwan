        }

        }
        .now-playing {
            text-align: center;
            margin-bottom: 12px;
        }
        .now-playing .song-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .now-playing .artist {

            color: #aaa;
        }
        .lyrics-container {
            height: 120px;
            overflow: hidden;
            margin: 12px 0;
            position: relative;
        }
        .lyrics {
            color: #666;
            font-size: 14px;
            line-height: 2;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .lyrics .line {
            padding: 2px 0;
        }
        .lyrics .line.active {
            color: #00d4ff;
            font-size: 16px;
            font-weight: 500;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
            margin-bottom: 8px;
            cursor: pointer;
            position: relative;
        }
        .progress {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            border-radius: 4px;
            width: 0%;
        }
        .chorus-marker {
            position: absolute;
            top: -3px;
            height: 14px;
            background: rgba(255, 215, 0, 0.4);
            border-left: 2px solid #ffd700;
            border-right: 2px solid #ffd700;
            border-radius: 2px;
            pointer-events: none;
            display: none;
        }
        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin-bottom: 16px;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 36px;
            padding: 12px 0;
        }
        .control-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            opacity: 0.9;
        }
        .control-btn:active {
            opacity: 0.4;
        }
        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }
        .volume-control .vol-icon {
            font-size: 16px;
            color: #888;
            cursor: pointer;
            flex-shrink: 0;
        }
        .volume-control input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            outline: none;
        }
        .volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
        }
        .toggles {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 14px;
        }
        .toggle-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #888;
        }
        .toggle-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 40px;
            height: 22px;
            background: rgba(255,255,255,0.15);
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .toggle-item input[type="checkbox"]::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #888;
            top: 2px;
            left: 2px;
            transition: all 0.2s;
        }
        .toggle-item input[type="checkbox"]:checked {
            background: rgba(0,212,255,0.4);
        }
        .toggle-item input[type="checkbox"]:checked::after {
            left: 20px;
            background: #00d4ff;
        }
        .playlist-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 14px;
        }
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

            font-size: 15px;
            font-weight: 600;
        }
        .search-box {
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            width: 140px;
            font-size: 13px;
            outline: none;
        }
        .search-box::placeholder {
            color: #666;
        }
        .playlist {
            max-height: 50vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .playlist::-webkit-scrollbar {
            width: 4px;
        }
        .playlist::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
        }
        .song-item {

            align-items: center;
            padding: 10px 8px;
            border-radius: 8px;
            cursor: pointer;
        }
        .song-item:active {
            background: rgba(255,255,255,0.1);
        }
        .song-item.playing {
            background: rgba(0,212,255,0.15);

        }
        .song-item .num {
            width: 28px;
            font-size: 12px;
            color: #555;
            flex-shrink: 0;
        }
        .song-item.playing .num {
            color: #00d4ff;
        }
        .song-item .info {
            flex: 1;
            min-width: 0;
        }
        .song-item .name {
            font-size: 14px;
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .song-item .artist {
            font-size: 12px;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .error-msg {
            text-align: center;
            padding: 8px;
            color: #ff6b6b;
            font-size: 13px;
        }
        .loading {
            text-align: center;
            padding: 12px;
            color: #4ecdc4;
            font-size: 13px;
            display: none;
        }
        .loading.active {
            display: block;
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #4ecdc4;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 6px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

            background: rgba(255,255,255,0.1);

            color: #aaa;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 10px;
            cursor: pointer;
        }
        .switch-source-btn:active {
            background: rgba(255,255,255,0.2);
        }
        .source-info {
            font-size: 11px;
            color: #555;
            margin-left: 4px;
        }

        }

            <div class="lyrics-container" id="lyricsContainer">

            <div class="volume-control">
                <span class="vol-icon" id="volIcon">🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="100">
            </div>
            <div class="toggles">
                <div class="toggle-item">
                    <input type="checkbox" id="randomMode">
                    <label for="randomMode">随机播放</label>
                </div>
                <div class="toggle-item">
                    <input type="checkbox" id="chorusOnly">
                    <label for="chorusOnly">只听副歌</label>
                </div>
                <div class="toggle-item source-switch" id="sourceSwitch" style="display:none">
                    <button id="switchSourceBtn" class="switch-source-btn">换源</button>
                    <span id="sourceInfo" class="source-info"></span>
                </div>
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <div id="loading" class="loading">正在加载歌曲</div>
        </div>

        <div class="playlist-section">

                <input type="text" class="search-box" id="searchBox" placeholder="搜索歌曲...">
            </div>
            <div class="playlist" id="playlist"></div>
        </div>
    </div>

        function renderPlaylist() {
            playlistEl.innerHTML = filteredSongs.map((song, i) => {

                <div class="song-item ${originalIndex === currentIndex ? 'playing' : ''}" data-index="${originalIndex}">

        // 播放歌曲
        // 歌词相关变量
        let parsedLyrics = [];
        let currentLyricIndex = -1;

        // 解析LRC格式歌词
        function parseLRC(lrcText) {
            const lines = lrcText.split('\n');
            const lyrics = [];
            const timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/;
            
            for (const line of lines) {
                const match = line.match(timeRegex);
                if (match) {
                    const mins = parseInt(match[1]);
                    const secs = parseInt(match[2]);
                    const ms = match[3].length === 3 ? parseInt(match[3]) : parseInt(match[3]) * 10;
                    const time = mins * 60 + secs + ms / 1000;
                    const text = match[4].trim();
                    if (text) {
                        lyrics.push({ time, text });
                    }
                }
            }
            return lyrics.sort((a, b) => a.time - b.time);
        }

        // 渲染歌词
        function renderLyrics() {
            const lyricsEl = document.getElementById('lyrics');
            cachedLyricLines = null; // 清空缓存
            if (parsedLyrics.length === 0) {
                lyricsEl.innerHTML = '<div class="line">暂无歌词</div>';
                return;
            }
            lyricsEl.innerHTML = parsedLyrics.map((l, i) => 
                `<div class="line" data-index="${i}">${l.text}</div>`
            ).join('');
        }

        // 更新歌词显示
        // 缓存歌词DOM元素引用
        let cachedLyricLines = null;
        let cachedLyricsEl = null;

        function updateLyrics(currentTime) {
            if (parsedLyrics.length === 0) return;
            
            // 二分查找当前歌词
            let newIndex = -1;
            let lo = 0, hi = parsedLyrics.length - 1;
            while (lo <= hi) {
                const mid = (lo + hi) >> 1;
                if (parsedLyrics[mid].time <= currentTime) {
                    newIndex = mid;
                    lo = mid + 1;
                } else {
                    hi = mid - 1;
                }
            }
            
            if (newIndex !== currentLyricIndex) {
                const oldIndex = currentLyricIndex;
                currentLyricIndex = newIndex;
                
                // 懒缓存歌词DOM
                if (!cachedLyricLines || !document.contains(cachedLyricsEl)) {
                    cachedLyricsEl = document.getElementById('lyrics');
                    cachedLyricLines = cachedLyricsEl.querySelectorAll('.line');
                }
                
                // 只更新变化的两行
                if (oldIndex >= 0 && cachedLyricLines[oldIndex]) {
                    cachedLyricLines[oldIndex].classList.remove('active');
                }
                if (newIndex >= 0 && cachedLyricLines[newIndex]) {
                    cachedLyricLines[newIndex].classList.add('active');
                }
                
                // 滚动到当前行
                if (newIndex >= 0 && cachedLyricLines[newIndex]) {
                    const container = document.getElementById('lyricsContainer');
                    const lineEl = cachedLyricLines[newIndex];
                    const offsetTop = lineEl.offsetTop - container.clientHeight / 2 + lineEl.clientHeight / 2;
                    cachedLyricsEl.style.transform = `translateY(-${offsetTop}px)`;
                }
            }
        }

        async function playSong(index) {
            if (index < 0 || index >= songs.length) return;
            
            // 清理旧的副歌状态和blob URL
            window._chorusEnd = null;
            if (audio.src && audio.src.startsWith('blob:')) {
                URL.revokeObjectURL(audio.src);
            }
            
            currentIndex = index;
            const song = songs[index];
            
            songNameEl.textContent = song.name;
            artistEl.textContent = song.artist;
            errorMsg.textContent = '';
            loadingEl.classList.add('active');
            
            renderPlaylist();
            
            // 重置歌词
            parsedLyrics = [];
            currentLyricIndex = -1;
            renderLyrics();

            try {
                // 一次搜索获取歌曲URL和歌词
                const keyword = `${song.name} ${song.artist}`.split('/')[0].trim();
                const searchUrl = `https://api.i-meto.com/meting/api?server=netease&type=search&id=${encodeURIComponent(keyword)}&limit=10`;
                const res = await fetch(searchUrl);
                const data = await res.json();
                
                if (!data || data.length === 0) {
                    throw new Error('未找到歌曲');
                }
                
                // 保存搜索结果，用于检测试听版本
                searchResults = data;
                tryIndex = 0;
                
                // 找到匹配歌手的结果，优先选择原唱
                const artistName = song.artist.split('/')[0].split('、')[0].trim();
                for (let i = 0; i < data.length; i++) {
                    if (data[i].author && data[i].author.includes(artistName)) {
                        tryIndex = i;
                        break;
                    }
                }
                
                // 用blob预加载音频，消除流式播放抖动
                loadingEl.classList.add('active');
                loadingEl.textContent = '正在加载歌曲...';
                
                try {
                    const audioRes = await fetch(data[tryIndex].url);
                    const audioBlob = await audioRes.blob();
                    audio.src = URL.createObjectURL(audioBlob);
                } catch (blobErr) {
                    // CORS失败时直接用URL播放
                    audio.src = data[tryIndex].url;
                }
                audio.play();
                isPlaying = true;
                playBtn.textContent = '■';
                loadingEl.classList.remove('active');
                loadingEl.textContent = '正在加载歌曲';
                updateSourceInfo();
                
                // 异步获取歌词
                if (data[tryIndex].lrc) {
                    fetch(data[tryIndex].lrc)
                        .then(r => r.text())
                        .then(lrcText => {
                            parsedLyrics = parseLRC(lrcText);
                            renderLyrics();
                        })
                        .catch(() => {
                            parsedLyrics = [];
                            renderLyrics();
                        });
                }
                
                // 副歌模式在音频加载后设置（通过loadedmetadata事件）
            } catch (e) {
                loadingEl.classList.remove('active');
                errorMsg.textContent = '播放失败，请尝试其他歌曲';
                console.error(e);
            }
        }

        // 设置副歌播放
        function setupChorus(songName) {
            const config = chorusConfig[songName];
            const duration = audio.duration;
            if (!config || !duration || isNaN(duration)) return;

            // 计算实际副歌时间
            let start = config.start;
            let end = config.start + config.duration;
            if (start >= duration) {
                start = 0;
                end = Math.min(config.duration, duration);
            } else if (end > duration) {
                end = duration;
            }

            window._chorusEnd = end;
            audio.currentTime = start;
        }

        // 更新副歌标记
        function updateChorusMarker() {
            const songName = songs[currentIndex]?.name;
            const config = chorusConfig[songName];
            const duration = audio.duration;
            
            if (config && duration && !isNaN(duration)) {
                // 如果歌曲太短，调整副歌时间
                let start = config.start;
                let end = config.start + config.duration;
                if (start >= duration) {
                    start = 0;
                    end = Math.min(config.duration, duration);
                } else if (end > duration) {
                    end = duration;
                }
                
                const startPercent = (start / duration) * 100;
                const widthPercent = ((end - start) / duration) * 100;
                chorusMarker.style.left = startPercent + '%';
                chorusMarker.style.width = widthPercent + '%';
                chorusMarker.style.display = 'block';
            } else {
                chorusMarker.style.display = 'none';
            }
        }

        // 副歌模式切换
        chorusOnly.addEventListener('change', () => {
            if (isPlaying && currentIndex >= 0) {
                if (chorusOnly.checked) {

                    window._chorusEnd = null;

                audio._prevVol = audio.volume;

        const switchSourceBtn = document.getElementById('switchSourceBtn');
        const sourceInfo = document.getElementById('sourceInfo');

        function updateSourceInfo() {
            if (searchResults.length > 1) {
                sourceSwitch.style.display = '';

                sourceSwitch.style.display = 'none';

        async function switchSource() {
            if (searchResults.length <= 1) return;
            if (currentIndex < 0) return;

            let nextIdx = tryIndex;
            // 找下一个有效源（最多循环一圈）
            for (let i = 0; i < searchResults.length; i++) {
                nextIdx = (nextIdx + 1) % searchResults.length;
                if (nextIdx === tryIndex) break; // 已经全部试过
                // 预检查：用HEAD请求获取时长太慢，直接尝试播放
                break;
            }
            if (nextIdx === tryIndex) return;

            tryIndex = nextIdx;
            loadingEl.classList.add('active');
            loadingEl.textContent = '切换源中...';

            if (audio.src && audio.src.startsWith('blob:')) {
                URL.revokeObjectURL(audio.src);
            }

            try {
                const res = await fetch(searchResults[tryIndex].url);
                const blob = await res.blob();
                audio.src = URL.createObjectURL(blob);
            } catch (e) {
                audio.src = searchResults[tryIndex].url;
            }
            audio.play();
            isPlaying = true;
            playBtn.textContent = '■';
            loadingEl.classList.remove('active');
            loadingEl.textContent = '正在加载歌曲';
            updateSourceInfo();

            // 获取歌词
            if (searchResults[tryIndex].lrc) {
                fetch(searchResults[tryIndex].lrc)
                    .then(r => r.text())
                    .then(lrcText => {
                        parsedLyrics = parseLRC(lrcText);
                        renderLyrics();
                    })
                    .catch(() => {});
            }
        }

        switchSourceBtn.addEventListener('click', switchSource);

        // 上一首
        prevBtn.addEventListener('click', () => {
            if (playMode === 'random') {
                playSong(Math.floor(Math.random() * filteredSongs.length));
            } else {
                let newIndex = currentIndex - 1;
                if (newIndex < 0) newIndex = filteredSongs.length - 1;
                playSong(newIndex);
            }
        });

        // 下一首
        nextBtn.addEventListener('click', () => {
            if (playMode === 'random') {
                playSong(Math.floor(Math.random() * filteredSongs.length));
            } else {
                let newIndex = currentIndex + 1;
                if (newIndex >= filteredSongs.length) newIndex = 0;
                playSong(newIndex);
            }
        });

        // 进度条点击
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audio.duration) {
                audio.currentTime = percent * audio.duration;
            }
        });

        // 播放时间更新 - 极简节流
        let lastUpdateFrame = 0;
        audio.addEventListener('timeupdate', () => {
            // 副歌结束检测（最轻量的检查，放最前面）
            if (chorusOnly.checked && window._chorusEnd && audio.currentTime >= window._chorusEnd) {
                window._chorusEnd = null;
                nextBtn.click();
                return;
            }
            const now = performance.now();
            if (now - lastUpdateFrame < 250) return; // 每秒最多4次
            lastUpdateFrame = now;
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            progress.style.width = percent + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
            totalTimeEl.textContent = formatTime(audio.duration);
            updateLyrics(audio.currentTime);
        });

        // 音频加载完成时更新副歌标记和设置副歌播放
        audio.addEventListener('loadedmetadata', async () => {
            const duration = audio.duration;
            
            // 检测是否是试听版本（小于90秒），尝试下一个结果，最多尝试5次
            if (duration && duration < 90 && searchResults.length > tryIndex + 1 && tryIndex < 5) {
                tryIndex++;
                if (audio.src.startsWith('blob:')) {
                    URL.revokeObjectURL(audio.src);
                }
                // 预加载新音频
                try {
                    const res = await fetch(searchResults[tryIndex].url);
                    const blob = await res.blob();
                    audio.src = URL.createObjectURL(blob);
                    audio.play();
                } catch (e) {
                    // fallback直接用URL
                    audio.src = searchResults[tryIndex].url;
                    audio.play();
                }
                // 获取新结果的歌词
                if (searchResults[tryIndex].lrc) {
                    fetch(searchResults[tryIndex].lrc)
                        .then(r => r.text())
                        .then(lrcText => {
                            parsedLyrics = parseLRC(lrcText);
                            renderLyrics();
                        })
                        .catch(() => {});
                }
                updateSourceInfo();
                return; // 等待新的loadedmetadata触发
            }
            
            updateChorusMarker();
            // 如果勾选了副歌模式，设置播放时间范围
            if (chorusOnly.checked && currentIndex >= 0) {
                setupChorus(songs[currentIndex].name);
            }
        });

        // 自动播放下一首
        audio.addEventListener('ended', () => {
            nextBtn.click();
        });

        // 格式化时间
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // 初始化
        renderPlaylist();
    </script>
</body>
</html>
